# Example docker-compose override for host file access
#
# Usage:
# 1. Copy this content to docker-compose.override.yml (git-ignored by default)
# 2. Customize the paths to match your needs
# 3. Run: docker-compose down && docker-compose --env-file .env up -d
#
# This will automatically merge with docker-compose.yml

version: '3.8'

services:
  druids-app:
    volumes:
      # CUSTOMIZE THESE PATHS for your host machine:

      # Documents - read-only access
      - ~/Documents:/app/host/documents:ro

      # Downloads - read-write access
      - ~/Downloads:/app/host/downloads:rw

      # Data processing directories
      - ~/data/input:/app/host/input:ro           # Read raw data
      - ~/data/output:/app/host/output:rw         # Write processed data

      # Reports directory
      - ~/reports:/app/host/reports:rw

      # Configuration files - read-only
      - ~/config:/app/host/config:ro

      # Temp directory - read-write
      - /tmp:/app/host/tmp:rw

  druids-mcp:
    volumes:
      # Same mounts as druids-app for consistent access
      - ~/Documents:/app/host/documents:ro
      - ~/Downloads:/app/host/downloads:rw
      - ~/data/input:/app/host/input:ro
      - ~/data/output:/app/host/output:rw
      - ~/reports:/app/host/reports:rw
      - ~/config:/app/host/config:ro
      - /tmp:/app/host/tmp:rw
