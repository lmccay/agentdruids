# Redis production configuration
bind 0.0.0.0
port 6379
timeout 0
tcp-keepalive 300

# Memory and persistence
maxmemory 256mb
maxmemory-policy allkeys-lru
save 900 1
save 300 10
save 60 10000

# Logging
loglevel warning
logfile "/var/log/redis/redis-server.log"

# Security
requirepass druids_redis_prod
protected-mode yes

# Performance tuning
tcp-backlog 511
databases 16