# DEV-ONLY OAuth shim in front of Dex (v2.46).
#
# Dex serves OIDC discovery only at /dex/.well-known/openid-configuration and
# supports neither the RFC 8414 metadata URL forms NOR Dynamic Client
# Registration (RFC 7591). MCP clients (e.g. Goose) require both: they fetch the
# authorization-server metadata, look for a registration_endpoint, register
# themselves to get a client_id, then run Authorization Code + PKCE.
#
# This shim:
#   - serves AS metadata (Dex's discovery doc + a registration_endpoint) at
#     every URL form a client derives from the issuer (http://localhost:5556/dex),
#   - answers POST /register by handing back the pre-registered public `goose`
#     client (so the client gets a usable client_id without real DCR), and
#   - passes everything else (authorize, token, keys, login, approval) to Dex.
# The issuer is unchanged, so token/ID-token validation stays consistent.
# Production (KnoxIDF/etc.) provides 8414 + DCR natively and this shim is unused.

server {
    listen 5556;
    server_name localhost;

    # --- Authorization Server Metadata (with registration_endpoint), all forms ---
    location = /.well-known/oauth-authorization-server     { default_type application/json; alias /etc/nginx/oauth-metadata.json; }
    location = /.well-known/oauth-authorization-server/dex { default_type application/json; alias /etc/nginx/oauth-metadata.json; }
    location = /dex/.well-known/oauth-authorization-server { default_type application/json; alias /etc/nginx/oauth-metadata.json; }
    location = /.well-known/openid-configuration           { default_type application/json; alias /etc/nginx/oauth-metadata.json; }
    location = /.well-known/openid-configuration/dex       { default_type application/json; alias /etc/nginx/oauth-metadata.json; }
    location = /dex/.well-known/openid-configuration       { default_type application/json; alias /etc/nginx/oauth-metadata.json; }

    # --- Dynamic Client Registration stub (Dex has none) ---
    # Returns the pre-registered public `goose` client. Its redirect_uris must
    # match Dex's static `goose` client (GOOSE_OAUTH_CALLBACK_PORT=8080).
    location = /register {
        default_type application/json;
        return 200 '{"client_id":"goose","token_endpoint_auth_method":"none","grant_types":["authorization_code","refresh_token"],"response_types":["code"],"redirect_uris":["http://127.0.0.1:8080/oauth_callback","http://localhost:8080/oauth_callback"]}';
    }

    # --- Everything else → Dex (authorize, token, keys, login form, approval) ---
    location / {
        proxy_pass http://druids-dex:5556;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
