# Redis development configuration
bind 0.0.0.0
port 6379
timeout 0
tcp-keepalive 300

# Memory and persistence
maxmemory 256mb
maxmemory-policy allkeys-lru
save 900 1
save 300 10
save 60 10000

# Logging
loglevel notice
logfile ""

# Security
requirepass druids_redis_dev

# Development settings
protected-mode no