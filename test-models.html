<!DOCTYPE html>
<html>
<head>
    <title>Models API Test</title>
</head>
<body>
    <h1>Models API Test</h1>
    <div id="result"></div>
    
    <script>
        console.log("Starting models API test...");
        
        fetch('/api/agents/models')
            .then(response => {
                console.log("Response status:", response.status);
                return response.json();
            })
            .then(data => {
                console.log("API Response:", data);
                document.getElementById('result').innerHTML = 
                    '<h2>API Response:</h2><pre>' + JSON.stringify(data, null, 2) + '</pre>';
            })
            .catch(error => {
                console.error("API Error:", error);
                document.getElementById('result').innerHTML = 
                    '<h2>Error:</h2><p>' + error.message + '</p>';
            });
    </script>
</body>
</html>
