services:
  # Main Druids Application
  druids-app:
    build:
      context: .
      target: development
      dockerfile: Dockerfile
    container_name: druids-main
    ports:
      - "3000:3000"   # Main API server - exposed for MCP clients
      - "9229:9229"   # Node.js debugging port
    environment:
      - NODE_ENV=development
      - PORT=3000
      - SERVER_HOST=${SERVER_HOST:-localhost}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:8080,http://localhost:3001}
      - LOG_LEVEL=debug
      - DRUIDS_ENV=docker-dev
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://druids-ollama:11434}
      - OLLAMA_MODEL=qwen2.5:1.5b
      - OLLAMA_TIMEOUT=300000
      # OpenAI API Configuration (enabled)
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_ORGANIZATION=${OPENAI_ORGANIZATION}
      - OPENAI_DEFAULT_MODEL=gpt-4
      - OPENAI_TIMEOUT=60000
      # GitHub MCP Server Authentication
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - DATABASE_URL=postgresql://druids_user:druids_pass_dev@druids-postgres:5432/druids
      - REDIS_URL=redis://:druids_redis_dev@druids-redis:6379
      # Docling document-ingestion service (druids-docling / docling-serve)
      - DOCLING_SERVICE_URL=${DOCLING_SERVICE_URL:-http://druids-docling:5001}
      # Staging root for directory ingestion (operator drops mirrors/archives here)
      - DOCUMENT_STAGING_DIR=${DOCUMENT_STAGING_DIR:-/app/data/staging}
      # Embeddings: bundled-local by default (TEI container); pluggable per deployment.
      # Set EMBEDDING_PROVIDER=ollama|openai|none to repoint or disable (lexical fallback).
      - EMBEDDING_PROVIDER=${EMBEDDING_PROVIDER:-tei}
      - EMBEDDING_SERVICE_URL=${EMBEDDING_SERVICE_URL:-http://druids-embeddings:80}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-sentence-transformers/all-MiniLM-L6-v2}
      - EMBEDDING_DIM=${EMBEDDING_DIM:-384}
      # Identity / OIDC (docs/identity-and-access-control.md). Pluggable issuer:
      # dev uses the bundled Dex container; prod points these at any OIDC
      # provider (Google, enterprise, KnoxIDF). OIDC_INTERNAL_ISSUER lets the
      # backend reach the IdP over the Docker network while the browser-facing
      # issuer stays localhost (dev only; unset in prod).
      - OIDC_ISSUER=${OIDC_ISSUER:-http://localhost:5556/dex}
      - OIDC_INTERNAL_ISSUER=${OIDC_INTERNAL_ISSUER:-http://druids-dex:5556/dex}
      - OIDC_CLIENT_ID=${OIDC_CLIENT_ID:-druids}
      - OIDC_CLIENT_SECRET=${OIDC_CLIENT_SECRET:-druids-dev-secret}
      # Auth flows through the UI origin (:3004) so the session cookie is
      # first-party to the SPA; nginx proxies /auth and /api to this backend.
      - OIDC_REDIRECT_URI=${OIDC_REDIRECT_URI:-http://localhost:3004/auth/callback}
      # First-admin break-glass: first login whose OIDC subject/email matches is admin.
      - ADMIN_OIDC_SUBJECT=${ADMIN_OIDC_SUBJECT:-admin@druids.dev}
      # Session signing + interim service-to-service token.
      - SESSION_SECRET=${SESSION_SECRET:-druids-dev-session-secret}
      - INTERNAL_SERVICE_TOKEN=${INTERNAL_SERVICE_TOKEN:-druids-dev-internal-token}
    volumes:
      - .:/app
      - /app/node_modules
      - druids-data:/app/data
      # Host-bound session publications archive (survives `docker-compose down -v`).
      # Rendered artifacts for `report` / `dataset` / `transcript` modes land here.
      - ~/druids-data/sessions:/app/data/sessions
      # Document ingestion staging area: operator drops wget mirrors / extracted
      # archives here, then triggers POST /api/ingest/directory. Defaults to the
      # druids-data volume; uncomment to stage from a host directory instead:
      # - ~/druids-data/staging:/app/data/staging:rw

      # HOST FILE ACCESS: Uncomment and customize to give agents access to your host machine's files
      # Format: <host-path>:<container-path>:<ro|rw>
      # - ro = read-only (agents can use read_file but not write_file)
      # - rw = read-write (agents can use both read_file and write_file)
      #
      # Examples (uncomment and adjust paths as needed):
      # - ~/Documents:/app/host/documents:ro        # Read-only access to Documents
      # - ~/Downloads:/app/host/downloads:rw        # Read-write access to Downloads
      # - ~/data/input:/app/host/input:ro           # Read input data
      # - ~/data/output:/app/host/output:rw         # Write processed output
      # - ~/reports:/app/host/reports:rw            # Generate reports
      # - ~/config:/app/host/config:ro              # Read configuration files
      #
      # Then grant agents permission in their resourceAccess configuration:
      # "allowedLocations": [
      #   "file:///app/host/documents/**/*",
      #   "file:///app/host/downloads/**/*"
      # ]
      #
      # See docs/HOST_FILE_ACCESS.md for complete guide

    networks:
      - druids-network
    depends_on:
      - druids-redis
      - druids-postgres
      - druids-dex
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # MCP Server for external client integration (using fixed SimpleMCPServer)
  druids-mcp:
    build:
      context: .
      target: development
      dockerfile: Dockerfile
    container_name: druids-mcp-server
    ports:
      - "3003:3003"   # MCP protocol server - exposed for external MCP clients
    environment:
      - NODE_ENV=development
      - MCP_SERVER_PORT=3003
      - MCP_SERVER_HOST=0.0.0.0
      - PORT=3003  # Internal port for this container
      - SERVER_HOST=${SERVER_HOST:-localhost}
      - LOG_LEVEL=debug
      - MAIN_APP_URL=http://druids-main:3000
      # Slice H ingress auth: OIDC config so the MCP server can validate bearer
      # tokens (via userinfo), and the service token so its app calls are trusted.
      - OIDC_ISSUER=${OIDC_ISSUER:-http://localhost:5556/dex}
      - OIDC_INTERNAL_ISSUER=${OIDC_INTERNAL_ISSUER:-http://druids-dex:5556/dex}
      - OIDC_CLIENT_ID=${OIDC_CLIENT_ID:-druids}
      - OIDC_CLIENT_SECRET=${OIDC_CLIENT_SECRET:-druids-dev-secret}
      - OIDC_REDIRECT_URI=${OIDC_REDIRECT_URI:-http://localhost:3004/auth/callback}
      - INTERNAL_SERVICE_TOKEN=${INTERNAL_SERVICE_TOKEN:-druids-dev-internal-token}
    volumes:
      - .:/app
      - /app/node_modules
      - druids-data:/app/data
      # Host-bound session publications archive (matches druids-main mount)
      - ~/druids-data/sessions:/app/data/sessions

      # HOST FILE ACCESS: Same mounts as druids-app for consistent file access
      # Uncomment the same host mounts you enabled in druids-app above
      # Examples:
      # - ~/Documents:/app/host/documents:ro
      # - ~/Downloads:/app/host/downloads:rw
      # - ~/data/input:/app/host/input:ro
      # - ~/data/output:/app/host/output:rw

    networks:
      - druids-network
    depends_on:
      - druids-app
    restart: unless-stopped
    command: npm run mcp:server
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3003/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # Docling document-ingestion service (docling-serve, CPU).
  # Stateless conversion: Druids' DoclingService calls it over HTTP and owns
  # all persistence. Default in-process (local) engine — no Redis needed.
  # First start downloads model weights (GB-scale, several minutes).
  druids-docling:
    image: quay.io/docling-project/docling-serve
    container_name: druids-docling
    ports:
      - "5001:5001"   # docling-serve REST API
    environment:
      - UVICORN_HOST=0.0.0.0
      - UVICORN_PORT=5001
      - DOCLING_SERVE_ENABLE_UI=false
      - DOCLING_DEVICE=cpu
      - OMP_NUM_THREADS=4
    networks:
      - druids-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

  # Default embedding model — bundled local (Text-Embeddings-Inference).
  # Generation models default to remote; embeddings default to local so the
  # corpus is indexed on-box without egress. Pluggable: set EMBEDDING_PROVIDER on
  # druids-app to point at a local Ollama or a remote API and ignore this service.
  # all-MiniLM-L6-v2 (384-dim) aligns with the chunker's default tokenizer.
  druids-embeddings:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-1.6
    # TEI CPU images are amd64-only; pin the platform so it runs everywhere —
    # natively on x86, and via Rosetta x86 emulation on Apple Silicon (fine for
    # a 22M model). One bundled default image across architectures.
    platform: linux/amd64
    container_name: druids-embeddings
    command: ["--model-id", "sentence-transformers/all-MiniLM-L6-v2", "--port", "80"]
    ports:
      - "8090:80"   # TEI API (host 8090 -> container 80)
    networks:
      - druids-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Frontend UI
  druids-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: druids-frontend
    ports:
      - "3004:80"   # Frontend UI - exposed for users
    environment:
      - NODE_ENV=production
    networks:
      - druids-network
    depends_on:
      - druids-app
      - druids-mcp
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # Redis for caching and session storage
  druids-redis:
    image: redis:7-alpine
    container_name: druids-redis
    ports:
      - "6379:6379"
    volumes:
      - druids-redis-data:/data
      - ./docker/redis.conf:/usr/local/etc/redis/redis.conf
    command: redis-server /usr/local/etc/redis/redis.conf
    networks:
      - druids-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Dex — bundled DEV-ONLY OIDC provider (docs/identity-and-access-control.md).
  # Provides a real Authorization Code + PKCE flow for local development. In
  # production this is not deployed; OIDC_ISSUER points at a real provider.
  druids-dex:
    image: dexidp/dex:latest
    container_name: druids-dex
    command: ["dex", "serve", "/etc/dex/config.yaml"]
    # No host port — fronted by druids-dex-proxy on :5556 (serves the RFC 8414
    # metadata Dex lacks). Internal callers still reach it at druids-dex:5556.
    expose:
      - "5556"
    volumes:
      - ./docker/dex/config.yaml:/etc/dex/config.yaml:ro
    networks:
      - druids-network
    restart: unless-stopped

  # DEV-ONLY metadata shim fronting Dex on :5556 — serves the RFC 8414
  # authorization-server metadata MCP clients require (Dex only serves OIDC
  # discovery). See docker/dex-proxy/nginx.conf.
  druids-dex-proxy:
    image: nginx:alpine
    container_name: druids-dex-proxy
    ports:
      - "5556:5556"
    volumes:
      - ./docker/dex-proxy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/dex-proxy/oauth-metadata.json:/etc/nginx/oauth-metadata.json:ro
    networks:
      - druids-network
    depends_on:
      - druids-dex
    restart: unless-stopped

  # PostgreSQL for persistent storage
  druids-postgres:
    # pgvector-enabled Postgres 15 (adds the `vector` extension for embeddings).
    # Same major version as before, and the DB uses C collation, so the existing
    # data volume mounts cleanly (alpine/musl -> debian/glibc is collation-safe).
    image: pgvector/pgvector:pg15
    container_name: druids-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=druids
      - POSTGRES_USER=druids_user
      - POSTGRES_PASSWORD=druids_pass_dev
      - POSTGRES_INITDB_ARGS=--encoding=UTF-8 --lc-collate=C --lc-ctype=C
    volumes:
      - druids-postgres-data:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - druids-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U druids_user -d druids"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Ollama for LLM integration
  druids-ollama:
    image: ollama/ollama:latest
    container_name: druids-ollama
    ports:
      - "11434:11434"
    volumes:
      - druids-ollama-data:/root/.ollama
      - ./docker/ollama-init.sh:/ollama-init.sh
    networks:
      - druids-network
    restart: unless-stopped
    environment:
      - OLLAMA_HOST=0.0.0.0
      - OLLAMA_MODELS=qwen2.5:1.5b
      - OLLAMA_KEEP_ALIVE=24h
      - OLLAMA_NUM_PARALLEL=4
      - OLLAMA_MAX_LOADED_MODELS=2
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 60s
      timeout: 30s
      retries: 5
      start_period: 120s
    # Default command is already "ollama serve"
    # command: ["ollama", "serve"]
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '2.0'
        reservations:
          memory: 2G
          cpus: '1.0'

  # MCP Gateway (for external MCP client integration)
  druids-mcp-gateway:
    build:
      context: .
      target: development
    container_name: druids-mcp-gateway
    env_file:
      - .env
    ports:
      - "3001:3001"   # MCP protocol port - exposed for external clients
    environment:
      - NODE_ENV=development
      - PORT=3001  # Internal port for this container
      - DRUIDS_API_URL=http://druids-app:3000
      - MCP_MODE=server
      # OpenAI Configuration (preferred for production workloads)
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_BASE_URL=https://api.openai.com/v1
      - OPENAI_DEFAULT_MODEL=gpt-4
      - OPENAI_TIMEOUT=60000
      # Ollama Configuration (fallback for local development)
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://druids-ollama:11434}
      - OLLAMA_MODEL=qwen2.5:1.5b
      - OLLAMA_TIMEOUT=300000
      - DATABASE_URL=postgresql://druids_user:druids_pass_dev@druids-postgres:5432/druids
      - REDIS_URL=redis://:druids_redis_dev@druids-redis:6379
      # Slice H ingress auth (same as druids-mcp): OIDC token validation + service token.
      - OIDC_ISSUER=${OIDC_ISSUER:-http://localhost:5556/dex}
      - OIDC_INTERNAL_ISSUER=${OIDC_INTERNAL_ISSUER:-http://druids-dex:5556/dex}
      - OIDC_CLIENT_ID=${OIDC_CLIENT_ID:-druids}
      - OIDC_CLIENT_SECRET=${OIDC_CLIENT_SECRET:-druids-dev-secret}
      - OIDC_REDIRECT_URI=${OIDC_REDIRECT_URI:-http://localhost:3004/auth/callback}
      - INTERNAL_SERVICE_TOKEN=${INTERNAL_SERVICE_TOKEN:-druids-dev-internal-token}
    volumes:
      - .:/app
      - /app/node_modules
    networks:
      - druids-network
    depends_on:
      - druids-app
    restart: unless-stopped
    command: ["npm", "run", "mcp:server"]

  # Monitoring and observability
  druids-prometheus:
    image: prom/prometheus:latest
    container_name: druids-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml
      - druids-prometheus-data:/prometheus
    networks:
      - druids-network
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'

  # Grafana for monitoring dashboards
  druids-grafana:
    image: grafana/grafana:latest
    container_name: druids-grafana
    ports:
      - "3002:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=druids_admin
    volumes:
      - druids-grafana-data:/var/lib/grafana
      - ./docker/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./docker/grafana/datasources:/etc/grafana/provisioning/datasources
    networks:
      - druids-network
    restart: unless-stopped

volumes:
  druids-data:
    driver: local
  druids-redis-data:
    driver: local
  druids-postgres-data:
    driver: local
  druids-ollama-data:
    driver: local
  druids-prometheus-data:
    driver: local
  druids-grafana-data:
    driver: local

networks:
  druids-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
