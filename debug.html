<!DOCTYPE html>
<html>
<head>
    <title>Frontend Debug</title>
</head>
<body>
    <h1>Frontend Debug Test</h1>
    <p>If you can see this, the frontend is loading. Check the browser console for JavaScript errors.</p>
    
    <script>
        console.log("Test script is running");
        
        // Try to fetch the agent list to see if there are any API errors
        fetch('/api/agents')
            .then(response => response.json())
            .then(data => {
                console.log("API agents response:", data);
            })
            .catch(error => {
                console.error("API agents error:", error);
            });
            
        // Try to fetch the models list
        fetch('/api/agents/models')
            .then(response => response.json())
            .then(data => {
                console.log("API models response:", data);
            })
            .catch(error => {
                console.error("API models error:", error);
            });
    </script>
</body>
</html>
